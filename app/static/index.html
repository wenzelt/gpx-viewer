<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrailBlaze — GPX Viewer</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    /* ── Trail-theme overrides (harmonise with landing page) ── */
    body {
      font-family: 'Satoshi', 'Space Grotesk', 'Inter', sans-serif !important;
      background-color: #0a0d0a !important;
      color: #e8ede8 !important;
    }
    h1, h2, h3 { font-family: 'Space Grotesk', 'Helvetica Neue', sans-serif !important; }

    /* Surface colours */
    .bg-gray-900 { background-color: #0a0d0a !important; }
    .bg-gray-800 { background-color: #141a14 !important; }

    /* Text colours */
    .text-gray-200 { color: #e8ede8 !important; }
    .text-gray-400 { color: #8a9e8a !important; }
    .text-gray-100 { color: #e8ede8 !important; }
    .text-gray-500 { color: #4a5e4a !important; }

    /* Primary green */
    .text-green-400  { color: #5db87a !important; }
    .bg-green-600    { background-color: #2d7a4a !important; }
    .hover\:bg-green-500:hover { background-color: #3d8856 !important; }

    /* Delete button */
    .bg-red-700      { background-color: #7a2323 !important; }
    .hover\:bg-red-600:hover { background-color: #963030 !important; }

    /* Borders */
    .border-gray-700              { border-color: #374437 !important; }
    .hover\:border-gray-600:hover { border-color: #4a5e4a !important; }

    /* Map spinner */
    .border-green-400 { border-color: #5db87a !important; }

    /* Status icon colours */
    .text-blue-500  { color: #5b9bd5 !important; }
    .text-red-400   { color: #e06060 !important; }

    /* Dropzone drag-over state */
    .dropzone-active { background-color: #141a14; border-color: #4a5e4a; }

    /* Progress bar */
    #map { height: calc(100vh - 200px); z-index: 1; }
    #mapLoader { backdrop-filter: blur(2px); }
    .dropzone { transition: all 0.3s ease; }
    .progress-container { margin-top: 6px; }
    .progress-bar {
      height: 6px;
      border-radius: 3px;
      background: #1a221a;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      width: 0%;
      background: #5db87a;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">
  <div class="container mx-auto px-4">
    <header class="py-6 flex flex-col md:flex-row md:items-center md:justify-between">
      <h1 class="text-2xl md:text-3xl font-bold text-green-400 flex items-center">
        <i data-feather="map" class="mr-2"></i> TrailBlaze GPX Viewer
      </h1>
      <button id="deleteAll" class="mt-4 md:mt-0 bg-red-700 hover:bg-red-600 text-white px-4 py-2 rounded-lg flex items-center transition">
        <i data-feather="trash-2" class="mr-2"></i> Delete All Tracks
      </button>
    </header>

    <main>
      <!-- Upload -->
      <div id="dropzone" class="dropzone border-2 border-dashed border-gray-700 rounded-xl p-8 mb-6 text-center cursor-pointer hover:border-gray-600 transition">
        <div class="flex flex-col items-center justify-center">
          <i data-feather="upload-cloud" class="w-12 h-12 text-gray-400 mb-4"></i>
          <h2 class="text-xl font-semibold mb-2">Upload GPX Files</h2>
          <p class="text-gray-400 mb-4">Drag & drop GPX files or click to browse</p>
          <input type="file" id="fileInput" accept=".gpx" multiple class="hidden">
          <button id="browseBtn" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-lg flex items-center transition">
            <i data-feather="folder" class="mr-2"></i> Browse Files
          </button>
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="hidden mb-6 p-4 rounded-lg bg-gray-800 flex flex-col space-y-2">
        <div class="flex items-start">
          <i data-feather="info" class="mr-3 text-blue-500"></i>
          <div>
            <h3 class="font-medium" id="statusTitle">Status</h3>
            <p class="text-gray-400 text-sm" id="statusMessage">Ready</p>
          </div>
        </div>
        <ul id="uploadList" class="space-y-2"></ul>
      </div>

      <!-- Map -->
      <div class="relative rounded-xl overflow-hidden shadow-xl">
        <div id="map" class="w-full"></div>
        <div id="mapLoader" class="absolute inset-0 flex flex-col items-center justify-center space-y-3 bg-black/60 text-gray-100 hidden">
          <div class="w-10 h-10 border-4 border-green-400 border-t-transparent rounded-full animate-spin"></div>
          <p id="mapLoaderMessage" class="text-sm tracking-wide uppercase">Loading tracks…</p>
        </div>
      </div>

      <!-- Stats -->
      <div id="statsBar" class="hidden mt-4 grid grid-cols-2 gap-4">
        <div class="bg-gray-800 rounded-xl p-4 flex items-center space-x-3">
          <i data-feather="map-pin" class="text-green-400 w-6 h-6 flex-shrink-0"></i>
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wide">Total Distance</p>
            <p id="statDistance" class="text-lg font-bold text-gray-100">—</p>
          </div>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 flex items-center space-x-3">
          <i data-feather="trending-up" class="text-green-400 w-6 h-6 flex-shrink-0"></i>
          <div>
            <p class="text-xs text-gray-400 uppercase tracking-wide">Total Elevation Gain</p>
            <p id="statElevation" class="text-lg font-bold text-gray-100">—</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="py-6 mt-8 text-center text-gray-500 text-sm">
      <p>Made with <i data-feather="heart" class="inline w-4 h-4 text-red-400"></i> for outdoor adventures</p>
    </footer>
  </div>

  <script>
    // Initialize map
    const map = L.map('map', { worldCopyJump: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const colors = {
          // Endurance
      running: "red",
      trail_running: "darkred",
      cycling: "orange",
      indoor_cycling: "coral",
      mountain_biking: "darkorange",
      walking: "brown",
      trekking: "saddlebrown",
      triathlon: "crimson",

      // Water
      swimming: "blue",
      open_water_swimming: "royalblue",
      kayaking: "deepskyblue",
      canoeing: "lightskyblue",
      rowing: "steelblue",
      sailing: "navy",
      diving: "darkblue",

      // Mountain / Outdoor
      hiking: "green",
      mountaineering: "darkgreen",
      climbing: "limegreen",
      bouldering: "mediumseagreen",
      skiing_touring: "forestgreen",
      cross_country_skiing: "seagreen",

      // Winter
      alpine_skiing: "cyan",
      snowboarding: "lightcyan",
      ice_skating: "teal",
      ice_hockey: "darkcyan",

      // Strength / Fitness
      crossfit: "purple",
      strength_training: "darkviolet",
      aerobics: "magenta",
      hiit: "orchid",
      gym: "plum",

      // Mind & body
      yoga: "gold",
      pilates: "khaki",
      meditation: "beige",

      // Misc
      chores: "gray",
      other: "black"
    };

    const layer = L.geoJSON(null, {
      style: f => ({
        color: colors[f.properties.tag] || "darkblue",
        weight: 4, opacity: 0.6
      })
    }).addTo(map);

    // Stats DOM refs
    const statsBar = document.getElementById('statsBar');
    const statDistance = document.getElementById('statDistance');
    const statElevation = document.getElementById('statElevation');

    function updateStats(geojson) {
      const features = geojson.features || [];

      if (features.length === 0) {
        statsBar.classList.add('hidden');
        return;
      }

      let totalDistanceM = 0;
      let totalElevationGainM = 0;
      let hasDistance = false;
      let hasElevation = false;

      for (const feature of features) {
        const props = feature.properties || {};
        if (props.total_distance_m != null) {
          totalDistanceM += props.total_distance_m;
          hasDistance = true;
        }
        if (props.total_elevation_gain_m != null) {
          totalElevationGainM += props.total_elevation_gain_m;
          hasElevation = true;
        }
      }

      if (hasDistance) {
        const distKm = totalDistanceM / 1000;
        statDistance.textContent = distKm >= 1
          ? distKm.toFixed(1) + ' km'
          : Math.round(totalDistanceM) + ' m';
      } else {
        statDistance.textContent = '—';
      }

      statElevation.textContent = hasElevation
        ? Math.round(totalElevationGainM) + ' m'
        : '—';

      statsBar.classList.remove('hidden');
      feather.replace();
    }

    // DOM refs
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn');
    const deleteAllBtn = document.getElementById('deleteAll');
    const statusEl = document.getElementById('status');
    const statusTitle = document.getElementById('statusTitle');
    const statusMessage = document.getElementById('statusMessage');
    const uploadList = document.getElementById('uploadList');
    const mapLoader = document.getElementById('mapLoader');
    const mapLoaderMessage = document.getElementById('mapLoaderMessage');

    let currentTracksEtag = null;
    let activeTracksController = null;
    let tracksRetryHandle = null;

    browseBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    dropzone.addEventListener('dragover', e => {
      e.preventDefault(); dropzone.classList.add('dropzone-active');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dropzone-active'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('dropzone-active');
      handleFiles(e.dataTransfer.files);
    });

    deleteAllBtn.addEventListener('click', async () => {
      if (!confirm("Delete all tracks?")) return;
      deleteAllBtn.disabled = true;
      deleteAllBtn.classList.add('opacity-60', 'cursor-not-allowed');
      try {
        const res = await fetch("/delete_all", { method: "DELETE" });
        if (!res.ok) throw new Error(await res.text());
        layer.clearLayers();
        statsBar.classList.add('hidden');
        currentTracksEtag = null;
        await loadTracks({ force: true });
      } catch (err) {
        showStatus("Error", "Delete failed: " + err.message, "error");
      } finally {
        deleteAllBtn.disabled = false;
        deleteAllBtn.classList.remove('opacity-60', 'cursor-not-allowed');
      }
    });

    async function handleFiles(files) {
      if (!files.length) return;
      uploadList.innerHTML = "";
      statusEl.classList.remove("hidden");
      statusTitle.textContent = "Uploading";
      statusMessage.textContent = `Uploading ${files.length} file(s)...`;

      for (const file of files) {
        const li = document.createElement("li");
        li.innerHTML = `
          <div class="text-sm mb-1">${file.name}</div>
          <div class="progress-bar"><div class="progress-bar-inner"></div></div>
          <div class="text-xs text-gray-400 mt-1 status-text">Queued</div>
        `;
        uploadList.appendChild(li);

        await uploadFile(file, li);
      }

      currentTracksEtag = null;
      await loadTracks({ force: true });
    }

    function uploadFile(file, li) {
      return new Promise((resolve, reject) => {
        const fd = new FormData();
        fd.append("files", file);

        const xhr = new XMLHttpRequest();
        const bar = li.querySelector(".progress-bar-inner");
        const statusText = li.querySelector(".status-text");

        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            bar.style.width = percent + "%";
            statusText.textContent = `Uploading... ${percent}%`;
          }
        };

        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              const data = JSON.parse(xhr.responseText);
              const r = data.results[0];
              if (r.status === "ok") {
                bar.style.background = "#5db87a";
                statusText.textContent = "Uploaded ✓";
              } else if (r.status === "skipped") {
                bar.style.background = "#e8a543";
                statusText.textContent = `Skipped (${r.reason})`;
              } else {
                bar.style.background = "#e06060";
                statusText.textContent = `Failed (${r.reason})`;
              }
            } catch {
              bar.style.background = "#e06060";
              statusText.textContent = "Failed (bad response)";
            }
            resolve();
          } else {
            bar.style.background = "#e06060";
            statusText.textContent = "Failed (server error)";
            reject();
          }
        };

        xhr.onerror = () => {
          bar.style.background = "#e06060";
          statusText.textContent = "Failed (network error)";
          reject();
        };

        xhr.open("POST", "/upload");
        xhr.send(fd);
      });
    }

    function toggleMapLoader(show, message = 'Loading tracks…') {
      if (!mapLoader) return;
      if (message && mapLoaderMessage) {
        mapLoaderMessage.textContent = message;
      }
      if (show) {
        mapLoader.classList.remove('hidden');
      } else {
        mapLoader.classList.add('hidden');
      }
    }

    async function loadTracks({ force = false } = {}) {
      if (activeTracksController) {
        activeTracksController.abort();
      }

      const controller = new AbortController();
      activeTracksController = controller;

      toggleMapLoader(true, force ? 'Refreshing tracks…' : 'Loading tracks…');

      const headers = { 'Cache-Control': 'no-cache' };
      if (!force && currentTracksEtag) {
        headers['If-None-Match'] = currentTracksEtag;
      }

      try {
        const res = await fetch('/tracks', { signal: controller.signal, headers });

        if (res.status === 304) {
          return;
        }

        if (!res.ok) {
          throw new Error(`Failed to load (${res.status})`);
        }

        const data = await res.json();
        currentTracksEtag = res.headers.get('ETag');
        layer.clearLayers();
        layer.addData(data);
        updateStats(data);
        if (tracksRetryHandle) {
          clearTimeout(tracksRetryHandle);
          tracksRetryHandle = null;
        }
        hideStatus();
        if (layer.getLayers().length > 0) {
          map.fitBounds(layer.getBounds(), { padding: [20,20] });
        }
      } catch (err) {
        if (err.name === 'AbortError') return;
        console.error(err);
        showStatus("Error", "Failed to load GPX tracks. Retrying shortly…", "error");
        if (tracksRetryHandle) {
          clearTimeout(tracksRetryHandle);
        }
        tracksRetryHandle = setTimeout(() => {
          tracksRetryHandle = null;
          loadTracks({ force: true });
        }, 4000);
      } finally {
        if (activeTracksController === controller) {
          activeTracksController = null;
          toggleMapLoader(false);
        }
      }
    }

    function hideStatus() {
      statusEl.classList.add('hidden');
    }

    function showStatus(title, msg, type) {
      statusEl.classList.remove("hidden");
      statusTitle.textContent = title;
      statusMessage.textContent = msg;
      statusEl.className = "mb-6 p-4 rounded-lg bg-gray-800 flex flex-col space-y-2";
      const icon = statusEl.querySelector("i");
      if (type === "error") {
        icon.setAttribute("data-feather", "alert-circle");
        statusTitle.className = "font-medium text-red-400";
      } else if (type === "success") {
        icon.setAttribute("data-feather", "check-circle");
        statusTitle.className = "font-medium text-green-400";
      } else {
        icon.setAttribute("data-feather", "info");
        statusTitle.className = "font-medium text-blue-400";
      }
      feather.replace();
    }

    // Initial: backfill stats for any pre-existing tracks, then load
    fetch('/backfill_stats', { method: 'POST' })
      .catch(() => {}) // best-effort; never blocks the map
      .finally(() => loadTracks({ force: true }));
    feather.replace();
  </script>
</body>
</html>
