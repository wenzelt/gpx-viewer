<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>GPX World Overview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body { height: 100%; margin: 0; }
    #map { width: 100%; height: calc(100% - 180px); } /* make room for header/footer */
    header, footer { padding: 8px 12px; font-family: system-ui, sans-serif; }
    .dropzone {
      border: 2px dashed #666;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
    }
    .dropzone.dragover { background: #e6f7ff; border-color: #1890ff; }
    #status {
      list-style: none;
      padding: 0;
      margin-top: 10px;
      font-family: system-ui, sans-serif;
      font-size: 0.9em;
    }
    #status li.ok { color: green; }
    #status li.failed { color: red; }
    #status li.skipped { color: orange; }
  </style>
</head>
<body>
  <header>
    <h3>GPX World Overview</h3>
    <div id="dropzone" class="dropzone">
      <p>Drag & drop GPX files here, or click to select</p>
      <input id="gpx" type="file" multiple accept=".gpx" hidden />
    </div>
    <ul id="status"></ul>
  </header>

  <div id="map"></div>

  <footer>
    Tiles: © <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="">
  </script>
  <script>
    // --- Map setup ---
    const map = L.map('map', { worldCopyJump: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const layer = L.geoJSON(null, { style: { weight: 3 } }).addTo(map);

    async function loadTracks() {
      const res = await fetch('/tracks');
      if (!res.ok) return;
      const data = await res.json();
      layer.clearLayers();
      layer.addData(data);
      if (layer.getLayers().length > 0) {
        map.fitBounds(layer.getBounds(), { padding: [20, 20] });
      }
    }

    // --- Drag & Drop Upload ---
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("gpx");
    const statusList = document.getElementById("status");

    dropzone.addEventListener("click", () => fileInput.click());

    dropzone.addEventListener("dragover", e => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", e => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener("change", e => {
      handleFiles(e.target.files);
    });

    async function handleFiles(files) {
      if (!files.length) return;
      const fd = new FormData();
      for (const f of files) fd.append("files", f);

      statusList.innerHTML = `<li>Uploading ${files.length} file(s)...</li>`;
      try {
        const res = await fetch("/upload", { method: "POST", body: fd });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();

        statusList.innerHTML = "";
        for (const r of data.results) {
          const li = document.createElement("li");
          li.textContent = `${r.filename}: ${r.status}${r.reason ? " (" + r.reason + ")" : ""}`;
          li.className = r.status;
          statusList.appendChild(li);
        }

        await loadTracks(); // refresh map after upload
      } catch (e) {
        statusList.innerHTML = `<li class="failed">Upload failed: ${e.message || e}</li>`;
      }
    }

    // initial load
    loadTracks();
  </script>
</body>
</html>
