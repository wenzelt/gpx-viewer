<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrailBlaze GPX Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #map { height: calc(100vh - 200px); z-index: 1; }
    .dropzone { transition: all 0.3s ease; }
    .dropzone-active { background-color: #2d3748; border-color: #4a5568; }
    .progress-container { margin-top: 6px; }
    .progress-bar {
      height: 6px;
      border-radius: 3px;
      background: #2d3748;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      width: 0%;
      background: #48bb78;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">
  <div class="container mx-auto px-4">
    <header class="py-6 flex flex-col md:flex-row md:items-center md:justify-between">
      <h1 class="text-2xl md:text-3xl font-bold text-green-400 flex items-center">
        <i data-feather="map" class="mr-2"></i> TrailBlaze GPX Viewer
      </h1>
      <button id="deleteAll" class="mt-4 md:mt-0 bg-red-700 hover:bg-red-600 text-white px-4 py-2 rounded-lg flex items-center transition">
        <i data-feather="trash-2" class="mr-2"></i> Delete All Tracks
      </button>
    </header>

    <main>
      <!-- Upload -->
      <div id="dropzone" class="dropzone border-2 border-dashed border-gray-700 rounded-xl p-8 mb-6 text-center cursor-pointer hover:border-gray-600 transition">
        <div class="flex flex-col items-center justify-center">
          <i data-feather="upload-cloud" class="w-12 h-12 text-gray-400 mb-4"></i>
          <h2 class="text-xl font-semibold mb-2">Upload GPX Files</h2>
          <p class="text-gray-400 mb-4">Drag & drop GPX files or click to browse</p>
          <input type="file" id="fileInput" accept=".gpx" multiple class="hidden">
          <button id="browseBtn" class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-lg flex items-center transition">
            <i data-feather="folder" class="mr-2"></i> Browse Files
          </button>
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="hidden mb-6 p-4 rounded-lg bg-gray-800 flex flex-col space-y-2">
        <div class="flex items-start">
          <i data-feather="info" class="mr-3 text-blue-500"></i>
          <div>
            <h3 class="font-medium" id="statusTitle">Status</h3>
            <p class="text-gray-400 text-sm" id="statusMessage">Ready</p>
          </div>
        </div>
        <ul id="uploadList" class="space-y-2"></ul>
      </div>

      <!-- Map -->
      <div id="map" class="rounded-xl overflow-hidden shadow-xl"></div>
    </main>

    <footer class="py-6 mt-8 text-center text-gray-500 text-sm">
      <p>Made with <i data-feather="heart" class="inline w-4 h-4 text-red-400"></i> for outdoor adventures</p>
    </footer>
  </div>

  <script>
    // Initialize map
    const map = L.map('map', { worldCopyJump: true }).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const colors = {
          // Endurance
      running: "red",
      trail_running: "darkred",
      cycling: "orange",
      indoor_cycling: "coral",
      mountain_biking: "darkorange",
      walking: "brown",
      trekking: "saddlebrown",
      triathlon: "crimson",

      // Water
      swimming: "blue",
      open_water_swimming: "royalblue",
      kayaking: "deepskyblue",
      canoeing: "lightskyblue",
      rowing: "steelblue",
      sailing: "navy",
      diving: "darkblue",

      // Mountain / Outdoor
      hiking: "green",
      mountaineering: "darkgreen",
      climbing: "limegreen",
      bouldering: "mediumseagreen",
      skiing_touring: "forestgreen",
      cross_country_skiing: "seagreen",

      // Winter
      alpine_skiing: "cyan",
      snowboarding: "lightcyan",
      ice_skating: "teal",
      ice_hockey: "darkcyan",

      // Strength / Fitness
      crossfit: "purple",
      strength_training: "darkviolet",
      aerobics: "magenta",
      hiit: "orchid",
      gym: "plum",

      // Mind & body
      yoga: "gold",
      pilates: "khaki",
      meditation: "beige",

      // Misc
      chores: "gray",
      other: "black"
    };

    const layer = L.geoJSON(null, {
      style: f => ({
        color: colors[f.properties.tag] || "darkblue",
        weight: 4, opacity: 0.6
      })
    }).addTo(map);

    // DOM refs
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const browseBtn = document.getElementById('browseBtn');
    const deleteAllBtn = document.getElementById('deleteAll');
    const statusEl = document.getElementById('status');
    const statusTitle = document.getElementById('statusTitle');
    const statusMessage = document.getElementById('statusMessage');
    const uploadList = document.getElementById('uploadList');

    browseBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    dropzone.addEventListener('dragover', e => {
      e.preventDefault(); dropzone.classList.add('dropzone-active');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dropzone-active'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('dropzone-active');
      handleFiles(e.dataTransfer.files);
    });

    deleteAllBtn.addEventListener('click', async () => {
      if (!confirm("Delete all tracks?")) return;
      try {
        const res = await fetch("/delete_all", { method: "DELETE" });
        if (!res.ok) throw new Error(await res.text());
        layer.clearLayers();
        showStatus("Success", "All tracks deleted", "success");
      } catch (err) {
        showStatus("Error", "Delete failed: " + err.message, "error");
      }
    });

    async function handleFiles(files) {
      if (!files.length) return;
      uploadList.innerHTML = "";
      statusEl.classList.remove("hidden");
      statusTitle.textContent = "Uploading";
      statusMessage.textContent = `Uploading ${files.length} file(s)...`;

      for (const file of files) {
        const li = document.createElement("li");
        li.innerHTML = `
          <div class="text-sm mb-1">${file.name}</div>
          <div class="progress-bar"><div class="progress-bar-inner"></div></div>
          <div class="text-xs text-gray-400 mt-1 status-text">Queued</div>
        `;
        uploadList.appendChild(li);

        await uploadFile(file, li);
      }

      await loadTracks();
    }

    function uploadFile(file, li) {
      return new Promise((resolve, reject) => {
        const fd = new FormData();
        fd.append("files", file);

        const xhr = new XMLHttpRequest();
        const bar = li.querySelector(".progress-bar-inner");
        const statusText = li.querySelector(".status-text");

        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            bar.style.width = percent + "%";
            statusText.textContent = `Uploading... ${percent}%`;
          }
        };

        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              const data = JSON.parse(xhr.responseText);
              const r = data.results[0];
              if (r.status === "ok") {
                bar.style.background = "#48bb78";
                statusText.textContent = "Uploaded ✓";
              } else if (r.status === "skipped") {
                bar.style.background = "#ecc94b";
                statusText.textContent = `Skipped (${r.reason})`;
              } else {
                bar.style.background = "#f56565";
                statusText.textContent = `Failed (${r.reason})`;
              }
            } catch {
              bar.style.background = "#f56565";
              statusText.textContent = "Failed (bad response)";
            }
            resolve();
          } else {
            bar.style.background = "#f56565";
            statusText.textContent = "Failed (server error)";
            reject();
          }
        };

        xhr.onerror = () => {
          bar.style.background = "#f56565";
          statusText.textContent = "Failed (network error)";
          reject();
        };

        xhr.open("POST", "/upload");
        xhr.send(fd);
      });
    }

    async function loadTracks() {
      const res = await fetch('/tracks');
      if (!res.ok) return;
      const data = await res.json();
      layer.clearLayers();
      layer.addData(data);
      if (layer.getLayers().length > 0) {
        map.fitBounds(layer.getBounds(), { padding: [20,20] });
      }
    }

    function showStatus(title, msg, type) {
      statusEl.classList.remove("hidden");
      statusTitle.textContent = title;
      statusMessage.textContent = msg;
      statusEl.className = "mb-6 p-4 rounded-lg bg-gray-800 flex flex-col";
      const icon = statusEl.querySelector("i");
      if (type === "error") {
        icon.setAttribute("data-feather", "alert-circle");
        statusTitle.className = "font-medium text-red-400";
      } else if (type === "success") {
        icon.setAttribute("data-feather", "check-circle");
        statusTitle.className = "font-medium text-green-400";
      } else {
        icon.setAttribute("data-feather", "info");
        statusTitle.className = "font-medium text-blue-400";
      }
      feather.replace();
    }

    // Initial
    loadTracks();
    feather.replace();
  </script>
</body>
</html>
