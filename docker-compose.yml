services:
  db:
    image: postgis/postgis:16-3.4
    container_name: gpx_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ./app
    container_name: gpx_app
    restart: unless-stopped
    environment:
      DB_DSN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      MAX_UPLOAD_MB: "50"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

  # OPTIONAL: reverse proxy with Caddy if you want HTTPS + domain
  # caddy:
  #   image: caddy:2
  #   container_name: gpx_caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     - DOMAIN=your.domain.tld
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - app

volumes:
  pgdata:
  uploads:
