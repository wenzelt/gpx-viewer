
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: gpx_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gpx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpxpassword}
      POSTGRES_DB: ${POSTGRES_DB:-gpxdb}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gpx} -d ${POSTGRES_DB:-gpxdb} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: gpx_app
    restart: unless-stopped
    environment:
      DB_DSN: postgresql+psycopg2://${POSTGRES_USER:-gpx}:${POSTGRES_PASSWORD:-gpxpassword}@db:5432/${POSTGRES_DB:-gpxdb}
      APP_SECRET_PEPPER: ${APP_SECRET_PEPPER}
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      MAX_UPLOAD_MB: "5"
      # optional: comma-separated list for stricter CORS in prod
      # ALLOWED_ORIGINS: "https://your.domain"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8008:8000"
    volumes:
      - uploads:/app/uploads
    # Security hardening (optional, remove if it breaks local dev)
    # read_only: true
    # tmpfs:
    #   - /tmp
    #   - /app/uploads:size=100m,mode=0777

volumes:
  pgdata:
  uploads:
